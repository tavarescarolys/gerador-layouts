const HANDLE='@atlantidamodapraia';
let fmt='feed', txt='VERÃO SEM FIM', brand='logo';

function waveSvg(w,h,op=1){
  const lines=[0,.2,.4,.6,.8].map((t,i)=>{
    const y=h*(0.1+t*0.8), amp=h*.055*(i%2?1:-1);
    return `<path d="M-10 ${y} Q ${w*.28} ${y+amp} ${w*.62} ${y-amp*.6} T ${w+10} ${y+amp*.35}" stroke="white" stroke-width="${w*.036}" fill="none" opacity="${op}"/>`;
  }).join('');
  return `<svg width="${w}" height="${h}" viewBox="0 0 ${w} ${h}" xmlns="http://www.w3.org/2000/svg">${lines}</svg>`;
}

// Brand mark: logo img OR @handle text (white)
function brandWhite(h, small=false){
  if(brand==='logo'){
    return `<img src="${LOGO_WHITE}" style="height:${h}px;width:auto;display:block"/>`;
  }
  const fs = small ? h*0.55 : h*0.6;
  return `<span style="font-family:AgWide;font-weight:300;font-size:${fs}px;letter-spacing:.04em;color:rgba(255,255,255,.88);white-space:nowrap">${HANDLE}</span>`;
}

// Brand mark: logo blue OR @handle text (deep blue, for cyan bg)
function brandDark(h){
  if(brand==='logo'){
    return `<img src="${LOGO_BLUE}" style="height:${h}px;width:auto;display:block"/>`;
  }
  const fs = h*0.58;
  return `<span style="font-family:AgWide;font-weight:300;font-size:${fs}px;letter-spacing:.04em;color:#004f8f;white-space:nowrap">${HANDLE}</span>`;
}

function tplA(w,h){
  const p=w*.065, fe=w*.038, fh=w*.17, lh=w*.085;
  return `<div class="canvas" style="width:${w}px;height:${h}px;background:#004f8f;position:relative;overflow:hidden">
    <div style="position:absolute;inset:0;background:linear-gradient(155deg,#002d52 0%,#004f8f 40%,#0a6b8b 70%,#0da1cc 100%)"></div>
    <div style="position:absolute;inset:0;opacity:.32">${waveSvg(w,h*.6)}</div>
    <div style="position:absolute;inset:0;background:linear-gradient(to top,rgba(0,21,40,.94) 0%,rgba(0,33,61,.5) 45%,rgba(0,33,61,0) 100%)"></div>
    <div style="position:absolute;top:${p}px;left:${p}px;display:flex;align-items:center">
      ${brandWhite(lh)}
    </div>
    <div style="position:absolute;bottom:0;left:0;right:0;padding:${p}px">
      <div style="font-family:AgWide;font-weight:300;font-size:${fe}px;letter-spacing:.26em;text-transform:uppercase;color:#0da1cc;margin-bottom:${w*.02}px">MODA PRAIA</div>
      <div style="font-family:AgTight;font-size:${fh}px;text-transform:uppercase;color:#fff;line-height:.91;letter-spacing:-.01em">${txt}</div>
      <div style="width:${w*.38}px;height:2px;background:linear-gradient(90deg,#0da1cc,transparent);border-radius:2px;margin-top:${w*.025}px"></div>
    </div>
  </div>`;
}

function tplB(w,h){
  const p=w*.065, fe=w*.038, fh=w*.155, lh=w*.07;
  if(fmt==='feed'){
    const iw=Math.round(w*.58), bw=w-iw;
    return `<div class="canvas" style="width:${w}px;height:${h}px;display:flex;overflow:hidden">
      <div style="width:${iw}px;height:${h}px;position:relative;overflow:hidden;background:linear-gradient(160deg,#002d52,#0a6b8b)">
        <div style="position:absolute;inset:0;opacity:.38">${waveSvg(iw,h)}</div>
        <div style="position:absolute;inset:0;background:linear-gradient(to right,transparent 55%,rgba(0,79,143,.3) 100%)"></div>
      </div>
      <div style="width:${bw}px;height:${h}px;background:#004f8f;padding:${p}px ${p*.8}px;display:flex;flex-direction:column;justify-content:space-between">
        <div></div>
        <div>
          <div style="width:${w*.11}px;height:3px;background:#0da1cc;border-radius:2px;margin-bottom:${w*.055}px"></div>
          <div style="font-family:AgWide;font-weight:300;font-size:${fe}px;letter-spacing:.24em;text-transform:uppercase;color:#0da1cc;margin-bottom:${w*.03}px">MODA<br>PRAIA</div>
          <div style="font-family:AgTight;font-size:${fh}px;text-transform:uppercase;color:#fff;line-height:.92;letter-spacing:-.01em">${txt}</div>
        </div>
        <div style="display:flex;align-items:center">${brandWhite(lh, true)}</div>
      </div>
    </div>`;
  } else {
    const ih=Math.round(h*.52), bh=h-ih, p2=w*.07;
    return `<div class="canvas" style="width:${w}px;height:${h}px;display:flex;flex-direction:column;overflow:hidden">
      <div style="width:${w}px;height:${ih}px;position:relative;overflow:hidden;background:linear-gradient(160deg,#002d52,#0a6b8b)">
        <div style="position:absolute;inset:0;opacity:.35">${waveSvg(w,ih)}</div>
        <div style="position:absolute;inset:0;background:linear-gradient(to bottom,transparent 55%,rgba(0,79,143,.35) 100%)"></div>
      </div>
      <div style="width:${w}px;height:${bh}px;background:#004f8f;padding:${p2}px;display:flex;flex-direction:column;justify-content:space-between">
        <div>
          <div style="width:${w*.12}px;height:3px;background:#0da1cc;border-radius:2px;margin-bottom:${p2*.8}px"></div>
          <div style="font-family:AgWide;font-weight:300;font-size:${w*.034}px;letter-spacing:.24em;text-transform:uppercase;color:#0da1cc;margin-bottom:${p2*.5}px">MODA PRAIA</div>
          <div style="font-family:AgTight;font-size:${w*.13}px;text-transform:uppercase;color:#fff;line-height:.92">${txt}</div>
        </div>
        <div style="display:flex;align-items:center">${brandWhite(w*.072, true)}</div>
      </div>
    </div>`;
  }
}

function tplC(w,h){
  const p=w*.07, fb=w*.038, fh=w*.21, lh=w*.06, cs=w*.19;
  return `<div class="canvas" style="width:${w}px;height:${h}px;background:#0da1cc;padding:${p}px;display:flex;flex-direction:column;justify-content:space-between;position:relative;overflow:hidden">
    <div style="position:absolute;right:-5%;bottom:-5%;opacity:.08">${waveSvg(w*.75,h*.5)}</div>
    <div style="display:flex;justify-content:space-between;align-items:flex-start;position:relative">
      <div style="display:flex;align-items:center">${brandDark(lh)}</div>
      ${brand==='logo' ? `<div style="width:${cs}px;height:${cs}px;border-radius:50%;border:2.5px solid rgba(255,255,255,.45);overflow:hidden;background:rgba(255,255,255,.18);display:flex;align-items:center;justify-content:center;padding:14%"><img src="${LOGO_SYMBOL}" style="width:100%;height:100%;object-fit:contain"/></div>` : ''}
    </div>
    <div style="position:relative">
      <div style="font-family:AgWide;font-weight:300;font-size:${fb}px;letter-spacing:.32em;text-transform:uppercase;color:rgba(255,255,255,.7);margin-bottom:${w*.04}px">A T L Â N T I D A</div>
      <div style="font-family:AgTight;font-size:${fh}px;text-transform:uppercase;color:#fff;line-height:.88;letter-spacing:-.02em">${txt}</div>
    </div>
    <div style="position:relative">
      <div style="width:${w*.12}px;height:3px;background:rgba(255,255,255,.4);border-radius:2px;margin-bottom:${p*.5}px"></div>
      <div style="font-family:AgWide;font-weight:300;font-size:${fb}px;letter-spacing:.3em;text-transform:uppercase;color:rgba(255,255,255,.7)">MODA PRAIA</div>
    </div>
  </div>`;
}

function render(){
  const W=fmt==='feed'?265:200, H=fmt==='feed'?331:356;
  const labels={A:'Template A — Full Image',B:'Template B — Split',C:'Template C — Tipográfico'};
  document.getElementById('grid').innerHTML=['A','B','C'].map(t=>`
    <div class="card">
      ${t==='A'?tplA(W,H):t==='B'?tplB(W,H):tplC(W,H)}
      <div class="card-label">${labels[t]}</div>
    </div>
  `).join('');
}

function setFmt(f){
  fmt=f;
  document.getElementById('bFeed').className='pill'+(f==='feed'?' active':'');
  document.getElementById('bStory').className='pill'+(f==='story'?' active':'');
  render();
}

function setBrand(b){
  brand=b;
  document.getElementById('bLogo').className='pill'+(b==='logo'?' active':'');
  document.getElementById('bHandle').className='pill'+(b==='handle'?' active':'');
  render();
}

function upd(v){txt=v.toUpperCase()||'VERÃO SEM FIM';render();}

render();
</script>
